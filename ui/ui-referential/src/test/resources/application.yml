spring:
  application:
    name: ${server-identity.identityRole}
  api:
    name: API for referential UI
    description: This API is used by the referential UI
    version: v1
  profiles:
    active: test
  jmx:
    default-domain: archive-search
  cloud:
    consul:
      discovery:
        enabled: false
        register: false

ui-referential:
  prefix: referential-api
  iam-external-client:
    server-host: localhost
    server-port: 8083
    secure: true
    ssl-configuration:
      keystore:
        key-path: src/main/resources/dev/keystore_ui-referential.jks
        key-password: changeme
        type: JKS
      truststore:
        key-path: src/main/resources/dev/truststore_server.jks
        key-password: changeme
      hostname-verification: false
  referential-external-client:
    server-host: localhost
    server-port: 8087
    secure: true
    ssl-configuration:
      keystore:
        key-path: src/main/resources/dev/keystore_ui-referential.jks
        key-password: changeme
        type: JKS
      truststore:
        key-path: src/main/resources/dev/truststore_server.jks
        key-password: changeme
      hostname-verification: false

ui-prefix: referential-api

server-identity:
  identityName: vitamui
  identityRole: ui-referential
  identityServerId: 1

server:
  servlet:
    encoding:
      force-response: true
      charset: UTF-8
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  host: dev.vitamui.com
  port: 8081
  scheme: https
  ssl:
    key-store: src/main/resources/dev/keystore_ui-referential.jks
    key-store-password: changeme
    key-password: changeme
    enabled-protocols: TLSv1.2,TLSv1.3
    ciphers: ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384

controller:
  subrogation:
    enabled: true
  user:
    enabled: true

ui:
  url: https://localhost:4201
  redirect-url: ${ui.url}

cas:
  internal-url: https://dev-cas.vitamui.com:8080
  external-url: https://dev-cas.vitamui.com:8080
  callback-url: ${ui.url}/callback
  ssl:
    trust-store: src/main/resources/dev/truststore_server.jks
    trust-store-password: changeme

debug: false
logging:
  level:
    fr.gouv.vitamui: DEBUG
