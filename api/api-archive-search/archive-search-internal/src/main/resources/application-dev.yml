debug: false

spring:
  profiles:
    active: swagger

  cloud:
    consul: #disabled for dev
      enabled: false
      discovery:
        enabled: false
        register: false

  data:
    mongodb:
      uri: mongodb://mongod_dbuser_archivesearch:mongod_dbpwd_archivesearch@localhost:27018/archivesearch?connectTimeoutMS=2000

multipart:
  enabled: true

spring.servlet.multipart.max-file-size: -1
spring.servlet.multipart.max-request-size: -1

server-identity:
  identityName: vitamui-dev
  identityRole: archive-search-internal
  identityServerId: 1

server:
  host:
  port: 7089
  ssl:
    key-store: src/main/resources/dev/keystore_archive-search-internal.jks
    key-store-password: changeme
    key-password: changeme
    trust-store: src/main/resources/dev/truststore_server.jks
    trust-store-password: changeme
    client-auth: need
    enabled-protocols: TLSv1.1,TLSv1.2,TLSv1.3
    ciphers: ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384


management:
  server:
    address: localhost
    port: 7189

clients:
  iam-internal:
    server-host: localhost
    server-port: 7083

swagger:
  file-path: file:../../../tools/swagger/docs/api-internal/archive-search-internal/swagger.json

# Jaeger
opentracing:
  jaeger:
    enabled: true
    logSpans: true
    expandExceptionLogs: true
    udp-sender:
      host: localhost
      port: 6831

logging:
  level:
    fr.gouv.vitamui.archive: DEBUG
    fr.gouv.vitamui.iam.security: INFO
    fr.gouv.vitam.archive: DEBUG
    fr.gouv.vitam.archive.*: DEBUG
    reactor.netty.*: DEBUG
#    org.springframework.core.env: DEBUG

