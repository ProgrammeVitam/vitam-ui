- hosts: hosts_ui_portal
  roles:
    - role: nginx-webapp
      vars:
        frontend_role_goal: "install"
        frontend_application_version: "5.4.0-SNAPSHOT" #"{{ app_version }}"
        frontend_application_name: "{{ hostvars[inventory_hostname]['ui_portal']['frontend_name'] }}"
      when: gateway.enabled | default(False)

