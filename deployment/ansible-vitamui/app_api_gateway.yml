---

- hosts: hosts_vitamui_api_gateway
  gather_facts: no
  any_errors_fatal: true
  roles:
    - vitamui
  vars:
    app_default_root_path: "/vitamui"
    vitamui_struct: "{{ vitamui.api_gateway }}"
    vitamui_certificate_type: "external"
    password_keystore: "{{ keystores_server_api_gateway }}"
    password_truststore: "{{ truststores_client_external }}"
    vitam_cert: "{{ vitam_certs.vitamui }}"
    consul_tags: "api-gateway, api, internal"

- hosts: hosts_ui_*
  gather_facts: no
  any_errors_fatal: true
  roles:
    - assets_copy

- hosts:
    - hosts_ui_portal
    - hosts_ui_identity
    - hosts_ui_identity_admin
    - hosts_ui_referential
    - hosts_ui_archive_search
    - hosts_ui_pastis
    - hosts_ui_collect
    - hosts_ui_ingest
  gather_facts: no
  any_errors_fatal: true
  roles:
    - nginx_webapp
  vars:
    vitamui_struct: "{{ vitamui | dict2items | selectattr('value.vitamui_component', 'eq', hostvars[inventory_hostname]['group_names'][0]) | map(attribute='value') | list | first }}"
    #vitamui_struct: "{{ vitamui[hostvars[inventory_hostname]['group_names'][0]] }"

