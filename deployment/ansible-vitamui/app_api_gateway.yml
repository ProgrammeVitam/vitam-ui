---

- hosts: hosts_vitamui_api_gateway
  gather_facts: no
  any_errors_fatal: true
  roles:
    - vitamui
  vars:
    app_default_root_path: "/vitamui"
    vitamui_struct: "{{ vitamui.api_gateway }}"
    vitamui_certificate_type: "server"
    password_keystore: "{{ keystores_server_api_gateway }}"
    password_truststore: "{{ truststores_server }}"
    vitam_cert: "{{ vitam_certs.vitamui }}"
    consul_tags: "api-gateway, api, internal"

- hosts: hosts_ui_portal
  gather_facts: no
  any_errors_fatal: true
  roles:
    - { role: assets_copy, when: gateway.enabled | default(False) }
    - { role: nginx-webapp, when: gateway.enabled | default(False) }
  vars:
    frontend_application_version: "5.4.0-SNAPSHOT" #"{{ app_version }}"
    frontend_application_name: "portal"

- hosts: hosts_ui_identity
  gather_facts: no
  any_errors_fatal: true
  roles:
    - { role: assets_copy, when: gateway.enabled | default(False) }
    - { role: nginx-webapp, when: gateway.enabled | default(False) }
  vars:
    frontend_application_version: "5.4.0-SNAPSHOT" #"{{ app_version }}"
    frontend_application_name: "identity"

- hosts: hosts_ui_identity_admin
  gather_facts: no
  any_errors_fatal: true
  roles:
    - { role: assets_copy, when: gateway.enabled | default(False) }
    - { role: nginx-webapp, when: gateway.enabled | default(False) }
  vars:
    frontend_application_version: "5.4.0-SNAPSHOT" #"{{ app_version }}"
    frontend_application_name: "identity-admin"

