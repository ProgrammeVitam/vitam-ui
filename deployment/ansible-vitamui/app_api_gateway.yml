---

- hosts: hosts_vitamui_api_gateway
  gather_facts: no
  any_errors_fatal: true
  roles:
    - vitamui
  vars:
    app_default_root_path: "/vitamui"
    vitamui_struct: "{{ vitamui.api_gateway }}"
    vitamui_certificate_type: "server"
    password_keystore: "{{ keystores_server_api_gateway }}"
    password_truststore: "{{ truststores_server }}"
    vitam_cert: "{{ vitam_certs.vitamui }}"
    consul_tags: "api-gateway, api, internal"

- hosts: hosts_ui_portal
  tasks:
    - include_role:
        name: assets_copy
      vars:
        asset_path: "{{ root_path }}/data/{{ frontend_app.name }}/package/assets"
        asset_favicon_path: "{{ root_path }}/data/{{ frontend_app.name }}/package"
        asset_user: "{{ frontend_user | default('nginx') }}"
        asset_group: "{{ frontend_group | default('nginx') }}"
      with_items:
        - "{{frontend.apps}}"
      loop_control:
        loop_var: frontend_app
      when: gateway.enabled | default(False)

