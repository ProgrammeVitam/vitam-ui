frontend:
  # Certificate/password for global certificate
  certificate: frontend
  key_password: "{{ vault_cert_server_frontend_key }}"
  repository_url: "http://nexus.dev.programmevitam.fr"
  apps:
    - name: identity
      certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-identity"
      key_pass: "{{ server_ui_identity_key }}" #"{{ vault_cert_client_client_external_ui_identity_key }}"
      #repo: "@vitam-ui"
    - name: identity-admin
      component: identity
      certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-identity-admin"
      key_pass: "{{ server_ui_identity_admin_key }}" #"{{ vault_cert_client_client_external_ui_identity_admin_key }}"
      #repo: "@vitam-ui"
    - name: portal
      certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-portal"
      key_pass: "{{ server_ui_portal_key }}" #"{{ vault_cert_client_client_external_ui_portal_key }}"
      #repo: "@vitam-ui"

frontend_user: "vitamui"
frontend_group: "vitamui"

#frontend_certificates:
# - "{{ pki_dir }}/certs/server/frontend*"

frontend_ssl_global_certificate_enabled: true
frontend_configurations: ["{{ playbook_dir }}/templates/frontend/nginx/conf.d/*"]

###### info in cas #### to move
app_certificates:
  - name: portal
    contextId: ui_portal_context
    certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-portal.crt"
    group: "ui_portal"
  - name: cas
    contextId: cas_context
    certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/cas_server.crt"
    group: "cas_server"
  - name: identity
    contextId: ui_admin_identity_context
    certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-identity-admin.crt"
    group: "ui_identity"
  - name: identity-admin
    contextId: ui_identity_context
    certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-identity.crt"
    group: "ui_identity_admin"
  - name: referential
    contextId: ui_referential_context
    certificate: "{{ inventory_dir }}/certs/server/hosts/vitam-env-xel-vm-0.vitam-env/ui-referential.crt"
    group: "ui_referential"
